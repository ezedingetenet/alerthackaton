<html>
  <head>
    <link rel="stylesheet" href="../style/style.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

      body {
        background: linear-gradient(135deg, #1a5a9e 0%, #2874b8 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-container {
        background: white;
        padding: 3rem;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 100%;
      }

      h1 {
        color: #1a5a9e;
        text-align: center;
        margin-bottom: 2rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #333;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 1rem;
        font-family: inherit;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #1a5a9e;
        box-shadow: 0 0 5px rgba(26, 90, 158, 0.1);
      }

      .btn-login {
        width: 100%;
        padding: 0.75rem;
        background-color: #1a5a9e;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .btn-login:hover {
        background-color: #1a4a7e;
      }

      .error-box {
        background-color: #f8d7da;
        color: #721c24;
        padding: 1rem;
        border-radius: 4px;
        margin-bottom: 1rem;
      }

      .error-box.hidden {
        display: none;
      }

      .back-link {
        text-align: center;
        margin-top: 1rem;
      }

      .back-link a {
        color: #1a5a9e;
        text-decoration: none;
        font-size: 0.9rem;
      }

      .back-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <h1>Admin Login</h1>

      <div id="error-message" class="error-box hidden"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@digitalhealthforum.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Password">
      </div>

      <button class="btn-login" onclick="login()">Login</button>

      <div class="back-link">
        <a href="../index.html">Back to Home</a>
      </div>
    </div>

    <script>
      const API_URL = 'https://alerthackaton.vercel.app/api';

      async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
          showError('Email and password are required');
          return;
        }

        try {
          const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });

          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || 'Login failed');
          }

          const { token, user } = await res.json();

          if (user.role !== 'admin') {
            throw new Error('Admin access required');
          }

          localStorage.setItem('token', token);
          localStorage.setItem('user', JSON.stringify(user));
          window.location.href = 'dashboard.html';
        } catch (err) {
          showError(err.message);
        }
      }

      function showError(message) {
        const errorBox = document.getElementById('error-message');
        errorBox.textContent = message;
        errorBox.classList.remove('hidden');
      }
    </script>
  </body>
</html>
