<html>
  <head>
    <link rel="stylesheet" href="../style/style.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      }

      .admin-header {
        background-color: #1a5a9e;
        color: white;
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .admin-header h1 {
        font-size: 1.5rem;
      }

      .admin-header button {
        background-color: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid white;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
      }

      .admin-header button:hover {
        background-color: rgba(255, 255, 255, 0.3);
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 60px;
        width: 250px;
        height: calc(100vh - 60px);
        background-color: white;
        border-right: 1px solid #ddd;
        overflow-y: auto;
      }

      .sidebar a {
        display: block;
        padding: 1rem 1.5rem;
        text-decoration: none;
        color: #333;
        border-left: 3px solid transparent;
        transition: all 0.3s ease;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background-color: #f0f0f0;
        border-left-color: #1a5a9e;
        color: #1a5a9e;
        font-weight: 600;
      }

      .main-content {
        margin-left: 250px;
        margin-top: 2rem;
        padding: 0 2rem 2rem 2rem;
      }

      .admin-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .tickets-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
      }

      .ticket-card {
        background: white;
        padding: 1.5rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: all 0.3s ease;
        border-left: 4px solid #ddd;
      }

      .ticket-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        transform: translateY(-2px);
      }

      .ticket-card.open {
        border-left-color: #e74c3c;
      }

      .ticket-card.in_progress {
        border-left-color: #f39c12;
      }

      .ticket-card.resolved {
        border-left-color: #27ae60;
      }

      .ticket-card.closed {
        border-left-color: #95a5a6;
      }

      .ticket-card h3 {
        color: #1a5a9e;
        margin-bottom: 0.5rem;
        font-size: 1.1rem;
      }

      .ticket-card p {
        color: #666;
        font-size: 0.9rem;
        margin: 0.25rem 0;
      }

      .status-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-top: 0.5rem;
      }

      .status-open {
        background-color: #fadbd8;
        color: #c0392b;
      }

      .status-in_progress {
        background-color: #fdebd0;
        color: #d68910;
      }

      .status-resolved {
        background-color: #d5f4e6;
        color: #1e8449;
      }

      .status-closed {
        background-color: #ecf0f1;
        color: #566573;
      }

      .ticket-detail {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .back-btn {
        background-color: #ddd;
        color: #333;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        margin-bottom: 1rem;
      }

      .back-btn:hover {
        background-color: #ccc;
      }

      .messages-container {
        background-color: #f9f9f9;
        padding: 1.5rem;
        border-radius: 8px;
        max-height: 400px;
        overflow-y: auto;
        margin: 1rem 0;
      }

      .message {
        margin-bottom: 1rem;
        padding: 0.75rem;
        background-color: white;
        border-left: 3px solid #ddd;
        border-radius: 4px;
      }

      .message.admin {
        border-left-color: #1a5a9e;
        background-color: #e3f2fd;
      }

      .message-header {
        font-weight: 600;
        color: #333;
        margin-bottom: 0.25rem;
      }

      .message-time {
        font-size: 0.8rem;
        color: #999;
      }

      .message-text {
        color: #555;
        margin-top: 0.5rem;
        line-height: 1.5;
      }

      .reply-form {
        margin-top: 1rem;
      }

      textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: inherit;
        font-size: 1rem;
        min-height: 100px;
        resize: vertical;
        box-sizing: border-box;
      }

      textarea:focus {
        outline: none;
        border-color: #1a5a9e;
        box-shadow: 0 0 5px rgba(26, 90, 158, 0.1);
      }

      .status-update {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      select {
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-family: inherit;
        font-size: 1rem;
      }

      .btn-send,
      .btn-update {
        padding: 0.75rem 1.5rem;
        background-color: #1a5a9e;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 0.5rem;
      }

      .btn-send:hover,
      .btn-update:hover {
        background-color: #1a4a7e;
      }

      .empty-message {
        text-align: center;
        padding: 2rem;
        color: #999;
      }
    </style>
  </head>

  <body>
    <div class="admin-header">
      <h1>Support Tickets</h1>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="sidebar">
      <a href="dashboard.html">Dashboard</a>
      <a href="registrations.html">Registrations</a>
      <a href="exhibitors.html">Exhibitors</a>
      <a href="schedule.html">Schedule</a>
      <a href="tickets.html" class="active">Support Tickets</a>
    </div>

    <div class="main-content">
      <div class="admin-container">
        <h2 style="color: #333; margin-bottom: 2rem;">Support Tickets</h2>

        <div id="tickets-view">
          <div class="tickets-list" id="tickets-grid"></div>
        </div>

        <div id="ticket-detail-view" class="hidden">
          <button class="back-btn" onclick="backToList()">← Back to Tickets</button>
          <div id="ticket-detail-content"></div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = '/api';
      let allTickets = [];
      let currentTicketId = null;

      document.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        if (!token) {
          window.location.href = 'login.html';
          return;
        }
        loadTickets();
      });

      async function loadTickets() {
        try {
          const token = localStorage.getItem('token');
          const res = await fetch(`${API_URL}/tickets`, {
            headers: { 'Authorization': `Bearer ${token}` },
          });

          if (!res.ok) throw new Error('Failed to load tickets');

          allTickets = await res.json();
          renderTicketsList();
        } catch (err) {
          console.error(err);
          alert('Failed to load tickets');
        }
      }

      function renderTicketsList() {
        const grid = document.getElementById('tickets-grid');

        if (allTickets.length === 0) {
          grid.innerHTML = '<div class="empty-message">No tickets</div>';
          return;
        }

        grid.innerHTML = allTickets.map(ticket => `
          <div class="ticket-card ${ticket.status}" onclick="viewTicket('${ticket.id}')">
            <h3>${ticket.subject}</h3>
            <p><strong>From:</strong> ${ticket.full_name}</p>
            <p><strong>Email:</strong> ${ticket.email}</p>
            <span class="status-badge status-${ticket.status}">${ticket.status}</span>
            <p style="margin-top: 0.5rem; font-size: 0.8rem; color: #999;">${new Date(ticket.created_at).toLocaleDateString()}</p>
          </div>
        `).join('');
      }

      async function viewTicket(ticketId) {
        try {
          const token = localStorage.getItem('token');
          const res = await fetch(`${API_URL}/tickets/${ticketId}/messages`, {
            headers: { 'Authorization': `Bearer ${token}` },
          });

          if (!res.ok) throw new Error('Failed to load ticket');

          const { ticket, messages } = await res.json();
          currentTicketId = ticketId;

          let detailHTML = `
            <div class="ticket-detail">
              <h2>${ticket.subject}</h2>
              <p style="color: #666; margin: 0.5rem 0;">From: ${allTickets.find(t => t.id === ticketId).full_name}</p>
              <span class="status-badge status-${ticket.status}">${ticket.status}</span>

              <div class="messages-container">
          `;

          messages.forEach(msg => {
            detailHTML += `
              <div class="message ${msg.is_admin_reply ? 'admin' : ''}">
                <div class="message-header">${msg.full_name} ${msg.is_admin_reply ? '(Admin)' : ''}</div>
                <div class="message-time">${new Date(msg.created_at).toLocaleString()}</div>
                <div class="message-text">${msg.message}</div>
              </div>
            `;
          });

          detailHTML += `
              </div>

              <div class="status-update">
                <select id="status-select">
                  <option value="open" ${ticket.status === 'open' ? 'selected' : ''}>Open</option>
                  <option value="in_progress" ${ticket.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
                  <option value="resolved" ${ticket.status === 'resolved' ? 'selected' : ''}>Resolved</option>
                  <option value="closed" ${ticket.status === 'closed' ? 'selected' : ''}>Closed</option>
                </select>
                <button class="btn-update" onclick="updateTicketStatus()">Update Status</button>
              </div>

              <div class="reply-form">
                <textarea id="reply-message" placeholder="Type your reply..."></textarea>
                <button class="btn-send" onclick="sendReply()">Send Reply</button>
              </div>
            </div>
          `;

          document.getElementById('ticket-detail-content').innerHTML = detailHTML;
          document.getElementById('tickets-view').classList.add('hidden');
          document.getElementById('ticket-detail-view').classList.remove('hidden');
        } catch (err) {
          alert('Error: ' + err.message);
        }
      }

      async function sendReply() {
        const message = document.getElementById('reply-message').value.trim();
        if (!message) {
          alert('Message cannot be empty');
          return;
        }

        try {
          const token = localStorage.getItem('token');
          const res = await fetch(`${API_URL}/tickets/${currentTicketId}/messages`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify({ message }),
          });

          if (!res.ok) throw new Error('Failed to send reply');

          document.getElementById('reply-message').value = '';
          viewTicket(currentTicketId);
        } catch (err) {
          alert('Error: ' + err.message);
        }
      }

      async function updateTicketStatus() {
        const status = document.getElementById('status-select').value;

        try {
          const token = localStorage.getItem('token');
          const res = await fetch(`${API_URL}/tickets/${currentTicketId}/status`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify({ status }),
          });

          if (!res.ok) throw new Error('Failed to update status');

          loadTickets();
          backToList();
        } catch (err) {
          alert('Error: ' + err.message);
        }
      }

      function backToList() {
        document.getElementById('tickets-view').classList.remove('hidden');
        document.getElementById('ticket-detail-view').classList.add('hidden');
        currentTicketId = null;
      }

      function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      }
    </script>
  </body>
</html>
